spring.application.name=heimdall

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/heimdall
spring.r2dbc.username=postgres
spring.r2dbc.password=yourpassword

spring.sql.init.mode=always

spring.grpc.server.port=9090
spring.grpc.server.reflection.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Redis sharding (consistent hashing) ─────────────────────────────
# Uncomment and add shards to enable. When enabled, keys are routed
# via a consistent hash ring. When disabled, the single-node
# spring.data.redis.* connection is used.
#
# heimdall.redis.virtual-nodes=150
# heimdall.redis.shards[0].host=localhost
# heimdall.redis.shards[0].port=6379
# heimdall.redis.shards[1].host=localhost
# heimdall.redis.shards[1].port=6380