spring.application.name=heimdall

spring.r2dbc.url=${DB_URL}
spring.r2dbc.username=${DB_USERNAME}
spring.r2dbc.password=${DB_PASSWORD}

spring.sql.init.mode=${SQL_INIT_MODE:always}

spring.grpc.server.port=${GRPC_PORT:9090}
spring.grpc.server.reflection.enabled=${GRPC_REFLECTION:true}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.username=${REDIS_USERNAME}

server.forward-headers-strategy=framework
# ── Redis sharding (consistent hashing) ─────────────────────────────
# Uncomment and add shards to enable. When enabled, keys are routed
# via a consistent hash ring. When disabled, the single-node
# spring.data.redis.* connection is used.
#
# heimdall.redis.virtual-nodes=150
# heimdall.redis.shards[0].host=localhost
# heimdall.redis.shards[0].port=6379
# heimdall.redis.shards[1].host=localhost
# heimdall.redis.shards[1].port=6380
