syntax = "proto3";

package dev.tobee.heimdall.services.grpc;

option java_package = "dev.tobee.heimdall.services.grpc";
option java_multiple_files = true;

service TestService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}
