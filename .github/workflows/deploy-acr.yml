name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Image and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=build-${{ github.run_number }}" >> $GITHUB_ENV
          echo "IMAGE_BASE=oinitreg.azurecr.io/heimdall" >> $GITHUB_ENV

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: oinitreg.azurecr.io
          username: ${{ secrets.AZURE_TOKEN_NAME }}
          password: ${{ secrets.AZURE_TOKEN_PWD }}

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE_BASE:$IMAGE_TAG -t $IMAGE_BASE:latest .
          docker push $IMAGE_BASE:$IMAGE_TAG
          docker push $IMAGE_BASE:latest

      - name: Update containerapp.yml with image tag
        run: |
          sed -i "s#oinitreg.azurecr.io/heimdall:.*#$IMAGE_BASE:$IMAGE_TAG#g" containerapp.yml

      - name: Upload containerapp.yml
        uses: actions/upload-artifact@v4
        with:
          name: containerapp
          path: containerapp.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production

    steps:
      - name: Download containerapp.yml
        uses: actions/download-artifact@v4
        with:
          name: containerapp

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: initrg
          containerAppName: heimdall
          yamlConfigPath: containerapp.yml
