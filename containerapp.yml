kind: ContainerApp
location: westeurope
name: heimdall
type: Microsoft.App/containerApps
properties:
  managedEnvironmentId: /subscriptions/0b7f4f69-a76b-4f78-bed6-3dfcecac0bd5/resourceGroups/initrg/providers/Microsoft.App/managedEnvironments/oinitenv
  configuration:
    secrets:
      - name: dbpass
        identity: system
        keyVaultUrl: https://initkeys.vault.azure.net/secrets/dbpass
      - name: redispass
        identity: system
        keyVaultUrl: https://initkeys.vault.azure.net/secrets/redispass
    ingress:
      external: true
      targetPort: 8080
      additionalPortMappings:
        - external: true
          targetPort: 9090
    registries:
      - server: oinitreg.azurecr.io
        identity: system
  template:
    containers:
      - name: heimdall
        image: oinitreg.azurecr.io/heimdall:latest
        env:
          - name: SPRING_APPLICATION_NAME
            value: heimdall
          - name: SPRING_DATASOURCE_URL
            value: jdbc:postgresql://heimdall-server.postgres.database.azure.com:5432/heimdall-database?sslmode=require
          - name: SPRING_DATASOURCE_USERNAME
            value: jhrmodpbnf@heimdall-server
          - name: SPRING_DATASOURCE_PASSWORD
            secretRef: dbpass
          - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
            value: org.postgresql.Driver
          - name: SPRING_GRPC_SERVER_PORT
            value: "9090"
          - name: SPRING_DATA_REDIS_HOST
            value: heimdall-cache.redis.cache.windows.net
          - name: SPRING_DATA_REDIS_PORT
            value: "6380"
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            value: update
          - name: SPRING_DATA_REDIS_PASSWORD
            secretRef: redispass
          - name: SPRING_DATA_REDIS_SSL
            value: "true"
          - name: SPRING_GRPC_SERVER_REFLECTION_ENABLED
            value: "true"
